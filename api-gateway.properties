server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/registry/eureka/

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.main.web-application-type=reactive

springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/user/v3/api-docs

springdoc.swagger-ui.urls[1].name=admin-service
springdoc.swagger-ui.urls[1].url=/admin-service/admin/v3/api-docs

springdoc.swagger-ui.urls[2].name=auth-service
springdoc.swagger-ui.urls[2].url=/auth-service/auth/v3/api-docs

springdoc.swagger-ui.urls[3].name=wallet-service
sprindoc.swagger-ui.urls[3].url=/wallet-service/wallet/v3/api-docs
